name: 'landscaping_erm'
version: '1.0.0'

profile: 'landscaping_erm'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Layered model architecture
models:
  landscaping_erm:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

vars:
  source_project: 'landscaping-erm'
  source_dataset: 'erm_data'
